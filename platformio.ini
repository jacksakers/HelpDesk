; PlatformIO configuration for HelpDesk
; Board: Elecrow 3.5" ESP32-S3 HMI (ST7789 + FT5x06 touch)

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; ── Board configuration ──────────────────────────────────────
; The Elecrow 3.5" uses DIO flash (confirmed by ROM: "mode:DIO").
; The default esp32-s3-devkitc-1 board assumes QIO — override it.
board_build.arduino.memory_type = dio_opi
board_build.flash_mode = dio
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -DBOARD_HAS_PSRAM                  ; PSRAM available (not required for display)
    ; LVGL needs to find lv_conf.h — tell it to look in include/
    -DLV_CONF_INCLUDE_SIMPLE
    -I include

; ── Libraries ────────────────────────────────────────────────
; PlatformIO downloads these automatically on first build
lib_deps =
    lovyan03/LovyanGFX @ ^1.2.0
    lvgl/lvgl @ ^9.2.0
    bblanchon/ArduinoJson @ ^7.0.0
    jgromes/RadioLib @ ^6.6.0
